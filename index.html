<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection Dashboard</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f6f9;
        }
        .sidebar{
            width:220px;
            height:100vh;
            background:#1f2937;
            color:white;
            position:fixed;
            padding:20px;
        }
        .sidebar h2{
            text-align:center;
        }
        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:10px;
            margin:10px 0;
            background:#374151;
            border-radius:8px;
        }
        .sidebar a:hover{
            background:#4b5563;
        }
        .main{
            margin-left:240px;
            padding:30px;
        }
        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            max-width:600px;
        }
        input{
            width:75%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
        }
        button{
            padding:12px 18px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
        button:hover{
            background:#1d4ed8;
        }
        .result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }
        .stats{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }
        .box{
            background:white;
            padding:20px;
            border-radius:12px;
            flex:1;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            text-align:center;
        }
    </style>
</head>
<body>
    

<div class="sidebar">
    <h2>🛡️ Detector</h2>
    <a href="/">🏠 Dashboard</a>
    <a href="/history">📊 History</a>
</div>

<div class="main">
    <h1> Phishing Detection Dashboard</h1>
    <p style="color:green; font-size:18px; font-weight:bold; margin-top:-5px;">
🤖 AI Detection Enabled (Naive Bayes Model)
</p>

    <div class="stats">
        <div class="box">
            <h3>✔ Status</h3>
            <p>System Active</p>
        </div>
        <div class="box">
            <h3>🔍 Scan Type</h3>
            <p>Email + URL</p>
        </div>
    </div>

    <div class="card">
        <h2 id="subtitle">Check Link or Email</h2>
        <form method="POST">
            <input type="text" id="voiceInput" name="url" placeholder="Enter URL or Email" required>
<button type="button" onclick="startVoice()">🎤</button>
<button type="submit">Check</button>
        </form>

        {% if result %}
        <div class="result">
            {{ result }}
        </div>
        {% endif %}
    </div>
</div>
<script>
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event) {
        document.getElementById("voiceInput").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}
</script>
</body>
</html>
