<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>
<body>
    <h1>📊 Checked URLs</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Result</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/">Back</a>
</body>
</html>
